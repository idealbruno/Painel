<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itanhaém</title>
    <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: Arial;
        background: #18191aa6;
        padding: 30px;
      }
      h1{
        text-align: center;
        margin-bottom: 30px;
        color: #eaf1f1;
      }
      h1::after{
        content: '';
        display: block;
        width: 100%;
        height: 3px;
        background-color: #e55501;
        margin: 10px auto;
      }
      h1:hover{
        color: #171a20dd;
      }

    .container {
        max-width: 800px;
        margin: auto;
      }
    .container {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
    }  
    .botaoBairro{
        display: grid;
        grid-template-columns: 1fr auto;
        width: 100%;
        padding: 10px;
        font-size: 20px;
        margin-bottom: 10px;
        background-color: #eaf1f1;
        color: rgb(15, 15, 16);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 10px 4px 8px rgba(13, 161, 241, 0.722);
        transition: all 0.3s ease;
    }
    .botaoBairro:hover{
       transform: scale(1.05);
         background-color: #e5ecec;
         color: rgb(6, 6, 69);
         font-weight: bold;
    }

    </style>
</head>
<body>
    <h1>🏢 Bairros de itanhaém</h1>

    <div class="container">
    </div>
</body>
</html>
