<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guarujá</title>
    <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: Arial;
        background: #eaebeca6;
        padding: 30px;
      }
      h1{
        text-align: center;
        margin-bottom: 30px;
        color: #1b1c1c;
      }
      h1::after{
        content: '';
        display: block;
        width: 100%;
        height: 3px;
        background-color: #e55501;
        margin: 10px auto;
      }

    .container {
        max-width: 800px;
        margin: auto;
      }
    .container {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
    }  
    .botaoBairro{
        display: grid;
        grid-template-columns: 1fr auto;
        width: 100%;
        padding: 8px;
        font-size: 20px;
        margin-bottom: 10px;
        background-color: #909696b8;
        color: rgb(15, 15, 16);
        border: none;
        text-align: center;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 10px 4px 8px rgba(39, 56, 65, 0.274);
        transition: all 0.3s ease;
    }
    .botaoBairro:hover{
         transform: scale(1.05);
         background-color: #e5ecec;
         color: rgb(6, 6, 69);
         font-weight: bold;
    }
    .btn{
        display: flex;
        justify-content: center;
        margin-top: 20px;
    }

    .btn-voltar {
       background-color: #007bff; /* Cor de fundo */
       color: white; /* Cor do texto */
       border: none; /* Remove a borda padrão */
       padding: 15px 22px; /* Espaçamento interno */
       font-size: 16px; /* Tamanho do texto */
       border-radius: 35px; /* Bordas arredondadas */
       cursor: pointer; /* Mostra o ícone de dedo clicável */
       transition: background-color 0.3s; /* Efeito suave ao passar o mouse */
     }
      
    .btn-voltar:hover {
      background-color: #0056b3;
      opacity: 0.9; /* Efeito de opacidade ao passar o mouse */
      font-weight: bold;
    }
    </style>
</head>
<body>
    
    <h1>🏢 Bairros do Guarujá</h1>

    <div class="container">
      <button class="botaoBairro">Astúrias (Jardim Astúrias)</button>

      <button class="botaoBairro">Jardim Bela Vista</button>

</html>
