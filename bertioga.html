<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baixada Santista</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial;
        background: #e5e5e6a6;
        padding: 30px;
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #2b2c2c;
      }
      h1::after {
        content: "";
        display: block;
        width: 100%;
        height: 3px;
        background-color: #e55501;
        margin: 10px auto;
      }
      h1:hover {
        color: #171a20dd;
      }

      .container {
        max-width: 800px;
        margin: auto;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      .botaoBairro {
        display: grid;
        grid-template-columns: 1fr auto;
        width: 100%;
        padding: 8px;
        font-size: 20px;
        margin-bottom: 10px;
        background-color: #ecf5f5;
        color: rgb(15, 15, 16);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 10px 4px 8px rgba(37, 44, 35, 0.722);
        transition: all 0.3s ease;
      }
      
      .botaoBairro:hover {
        transform: scale(1.05);
        background-color: #e5ecec;
        color: rgb(6, 6, 69);
        font-weight: bold;
      }
      .btn {
        display: flex;
        justify-content: center;
        margin-top: 30px;
      }

      .btn-voltar {
        background-color: #007bff; /* Cor de fundo */
        color: white; /* Cor do texto */
        border: none; /* Remove a borda padrão */
        padding: 12px 24px; /* Espaçamento interno */
        font-size: 16px; /* Tamanho do texto */
        border-radius: 35px; /* Bordas arredondadas */
        cursor: cursor; /* Mostra o ícone de dedo clicável */
        transition: background-color 0.3s; /* Efeito suave ao passar o mouse */
      }

      .btn-voltar:hover {
        background-color: #0056b3;
        opacity: 0.9; /* Efeito de opacidade ao passar o mouse */
      }
    </style>
  </head>
  <body>
    <h1>🏢 Bairros de Bertioga</h1>

    <div class="container">
      <button class="botaoBairro">Albatroz</button>

      <button class="botaoBairro">Boraceia</button>

      <button class="botaoBairro">Buriqui Costa Nativa</button>

      <button class="botaoBairro">Caiubura</button>

      <button class="botaoBairro">Centro</button>

      <button class="botaoBairro">Costa do Sol</button>

      <button class="botaoBairro">Chácaras</button>

      <button class="botaoBairro">Guaratuba</button>

      <button class="botaoBairro">Indaiá</button>

      <button class="botaoBairro">Jardim Raphael</button>

      <button class="botaoBairro">Jardim Vicente de Carvalho</button>

      <button class="botaoBairro">Maitinga</button>

      <button class="botaoBairro">Morada da Praia</button>

      <button class="botaoBairro">Rio da Praia</button>

      <button class="botaoBairro">Riviera</button>

      <button class="botaoBairro">São João</button>

      <button class="botaoBairro">São Lourenço</button>

      <button class="botaoBairro">Terras Indígenas do Rio Silveira</button>

      <button class="botaoBairro">Vista Linda</button>
    </div>

    <div class="btn">
      <button onclick="history.back()" class="btn-voltar">Voltar</button>
    </div>
  </body>
</html>
